name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4.0
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        # Includes the envelope wire-contract test at internal/envelope/envelope_contract_test.go.
        # That test walks internal/envelope/testdata/fixtures/{valid,invalid}/ and asserts
        # the collector's validator agrees with the ingest-side validator on every fixture.
        # Lock-step rule: any fixture change here must land in lock-step with the monorepo
        # (infra/schemas/fixtures/envelope/) per manifest §0.
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  helm:
    name: Helm lint and template
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.3

      - name: helm lint
        run: helm lint helm/collector

      - name: helm template (verify default values render cleanly)
        run: |
          helm template collector helm/collector --debug \
            --set tenantId=00000000-0000-0000-0000-000000000000 \
            --set collectorId=00000000-0000-0000-0000-000000000001 \
            > /dev/null

  # Helm unittest is skipped — no test files present in helm/collector/tests/.
  # Add tests under helm/collector/tests/ and enable helm-unittest plugin here
  # when coverage is needed.

  build-image:
    name: Build container image (no push on PR)
    needs: [lint, test, helm]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (validate only — release.yml publishes on tags)
        # CI is for validation. Pushing images is the release workflow's job,
        # which runs on v* tags with the correct packages:write permission
        # and produces the cosign-signed artefacts. Pushing again from CI
        # would either duplicate (with weaker provenance) or fail with 403
        # — historically the second.
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/collector:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}
