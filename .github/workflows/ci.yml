name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.4.0
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: go mod download
        run: go mod download

      - name: go vet
        run: go vet ./...

      - name: go test
        # Includes the envelope wire-contract test at internal/envelope/envelope_contract_test.go.
        # That test walks internal/envelope/testdata/fixtures/{valid,invalid}/ and asserts
        # the collector's validator agrees with the ingest-side validator on every fixture.
        # Lock-step rule: any fixture change here must land in lock-step with the monorepo
        # (infra/schemas/fixtures/envelope/) per manifest §0.
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out
          retention-days: 7

  helm:
    name: Helm lint and template
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.17.3

      # networkPolicy.egressCidr is intentionally required (no default) so a real
      # deploy cannot silently allow unrestricted 443 egress and defeat EU-residency
      # enforcement. CI passes a placeholder CIDR purely to verify the templates
      # render; it is never deployed.
      - name: helm lint
        run: helm lint helm/collector --set networkPolicy.egressCidr=203.0.113.0/32

      - name: helm template (verify default values render cleanly)
        run: |
          helm template collector helm/collector --debug \
            --set tenantId=00000000-0000-0000-0000-000000000000 \
            --set collectorId=00000000-0000-0000-0000-000000000001 \
            --set networkPolicy.egressCidr=203.0.113.0/32 \
            > /dev/null

  # Helm unittest is skipped — no test files present in helm/collector/tests/.
  # Add tests under helm/collector/tests/ and enable helm-unittest plugin here
  # when coverage is needed.

  envelope-contract-mirror:
    name: Envelope contract mirror (conflict-only, reciprocal)
    # ADR-0022 §2: reciprocal conflict-only fixture mirror.
    # Checks out the canonical monorepo and fails ONLY when a fixture present in
    # BOTH repos has different content. A fixture present in only one repo is an
    # in-flight lock-step addition, not a conflict. This eliminates the bootstrap
    # deadlock that exact-equality bidirectional mirrors create.
    #
    # Requires repository secret: OPERITAS_REPO_READ_TOKEN
    #   A fine-grained PAT with Contents: Read on operitas-eu/operitas (private).
    #   Fork PRs cannot access org secrets and are automatically skipped by the
    #   `if:` guard below; internal PRs and pushes to main always run the check.
    #
    # actions/checkout is SHA-pinned (supply-chain hygiene per ADR-0022 §2):
    #   actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 = v4.2.2
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout collector (this repo)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: collector

      - name: Checkout monorepo (envelope fixtures, read-only, sparse)
        # Not continue-on-error: a failed checkout must fail loudly. A silently
        # skipped diff gives false assurance — see the azure_activity.json drift
        # incident referenced in the monorepo's control-plane-ci.yaml.
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: operitas-eu/operitas
          ref: master
          path: operitas
          token: ${{ secrets.OPERITAS_REPO_READ_TOKEN }}
          sparse-checkout: infra/schemas/fixtures/envelope
          sparse-checkout-cone-mode: true

      - name: Self-test conflict-only comparison logic
        # Verifies the comparison script behaves correctly before trusting its output.
        # Tests: identical pass, collector-only pass, monorepo-only pass, same-path
        # different-content fails (exit 1), empty dir errors (exit 2).
        run: bash collector/.github/scripts/test-envelope-mirror.sh

      - name: Conflict-only fixture mirror check (collector vs monorepo)
        run: |
          bash collector/.github/scripts/envelope-mirror-check.sh \
            collector/internal/envelope/testdata/fixtures \
            operitas/infra/schemas/fixtures/envelope

  build-image:
    name: Build container image (no push on PR)
    needs: [lint, test, helm, envelope-contract-mirror]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build (validate only — release.yml publishes on tags)
        # CI is for validation. Pushing images is the release workflow's job,
        # which runs on v* tags with the correct packages:write permission
        # and produces the cosign-signed artefacts. Pushing again from CI
        # would either duplicate (with weaker provenance) or fail with 403
        # — historically the second.
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: ghcr.io/${{ github.repository_owner }}/collector:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ github.sha }}
