# Default values for collector.
# Override in a separate values file; never commit tenant secrets here.

image:
  repository: ghcr.io/operitas-eu/collector
  tag: "0.1.0"
  pullPolicy: IfNotPresent

# Number of collector replicas. 1 is strongly recommended to avoid double-counting
# events. Horizontal scaling requires external deduplication at the ingest layer.
replicaCount: 1

# Kubernetes service account. IRSA and Azure Workload Identity annotations
# are set below to grant the pod read-only S3 access without storing credentials.
serviceAccount:
  create: true
  name: ""
  annotations: {}
    # AWS IRSA — uncomment and set the role ARN:
    # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/collector-cloudtrail-reader
    #
    # Azure Workload Identity — uncomment and set:
    # azure.workload.identity/client-id: <managed-identity-client-id>

# Pod security context: run as nonroot, read-only root FS, drop all capabilities.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Persistent volume for the WAL spool and DLQ. The collector writes to
# /var/lib/operitas/wal/ (WAL, up to 1 GiB) and /var/lib/operitas/dlq/
# (dead-letter queue, up to 1 GiB). Both directories live under the same
# PVC mount at /var/lib/operitas. The default 2 GiB provides headroom for
# both; operators with high event volumes may increase this value.
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 2Gi

# Resource limits. The collector is designed to stay under 64 MB RSS at steady state.
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 128Mi

# Ports exposed by the collector.
#
# Transitional state: github (8081), gitlab (8083), and pagerduty (8082) run on
# dedicated ports. All new sources (jira, datadog, prometheus, and the 8 stubs)
# share a single webhook port (8090 by default). See the "Shared Webhook Router"
# section in README.md for migration guidance.
ports:
  githubWebhook: 8081
  pagerdutyWebhook: 8082
  gitlabWebhook: 8083
  # sharedWebhook is the port for all new sources: jira, datadog, prometheus,
  # bitbucket, flux, spacelift, incident.io, opsgenie, grafana, servicenow, argocd.
  sharedWebhook: 8090
  metrics: 9090

# Ingest endpoint. Must be an EU-resident host (validated at startup).
ingest:
  endpoint: "https://ingest.operitas.eu/v1/events:batch"

  # mTLS client certificate and key. Reference an existing Secret containing
  # tls.crt and tls.key. The collector refuses to start without these.
  tlsSecretName: "collector-mtls"

  # Optional: PEM file for the server CA. Leave empty to use the system cert pool.
  caSecretName: ""

# Tenant and collector identity. tenant_id and collector_id are UUIDs.
# These are written into the ConfigMap; they are not secret.
tenantId: ""
collectorId: ""

# apiKey is the bearer token in <key_id>.<secret> format minted by the Operitas
# portal enrollment flow (https://app.operitas.eu/settings/collectors).
# MUST be supplied via --set apiKey=... or by referencing an existing Secret.
#
# Option A — pass directly (value is stored in Helm release history; use only
#            for development or when Helm release history is encrypted at rest):
#   --set apiKey=<key_id>.<secret>
#
# Option B — reference an existing Secret (recommended for production):
#   Set apiKey: "" and set existingApiKeySecret to the name of a Secret whose
#   OPERITAS_INGEST_API_KEY key holds the plaintext token. The Secret must be
#   created before installing the chart (e.g. via External Secrets Operator or
#   kubectl create secret generic).
#
# The collector refuses to start if OPERITAS_INGEST_API_KEY is empty.
apiKey: ""

# existingApiKeySecret: if set, the chart mounts OPERITAS_INGEST_API_KEY from
# this Secret instead of the one generated from apiKey above.
# Both apiKey and existingApiKeySecret must not be set simultaneously.
existingApiKeySecret: ""

# Source configuration. All sources are disabled by default; enable
# only what the customer has connected.
sources:
  cloudtrail:
    enabled: false
    bucketName: ""
    # bucketRegion MUST be an EU AWS region. The collector validates this.
    # Permitted: eu-central-1, eu-central-2, eu-west-1, eu-west-2, eu-west-3,
    #            eu-north-1, eu-south-1, eu-south-2
    bucketRegion: "eu-central-1"
    prefix: "AWSLogs/"
    pollInterval: "5m"

  azure_activity:
    enabled: false

    # tenantId is the Azure Active Directory tenant ID (UUID).
    tenantId: ""

    # subscriptionId is the Azure subscription to monitor (UUID).
    subscriptionId: ""

    # clientId is the service principal or managed-identity client ID.
    # Leave empty when using a system-assigned managed identity.
    clientId: ""

    # useWorkloadIdentity, when true, uses Azure Workload Identity (federated OIDC
    # token exchange) instead of a client secret. Requires AKS with Workload Identity
    # enabled. The pod service account must be annotated with
    #   azure.workload.identity/client-id: <managed-identity-client-id>
    # and the serviceAccount.annotations block below must have the same annotation.
    useWorkloadIdentity: false

    # pollInterval controls how often Activity Logs are fetched from the ARM API.
    pollInterval: "5m"

    # pollLookback is the time window used on the first poll when no checkpoint exists.
    pollLookback: "1h"

    # clientSecret is the service-principal client secret.
    # MUST be supplied via the collector-secrets Secret under key
    # OPERITAS_AZURE_CLIENT_SECRET — never set this value directly in values.yaml.
    # If useWorkloadIdentity is true, this key is not required.

  github:
    enabled: false
    org: ""
    # Optional: specific repos to watch. If empty, all org repos are polled.
    repos: []
    webhookPort: 8081
    pollInterval: "60s"
    # Token and webhook secret are injected from the Secret (see secretName below).

  gitlab:
    enabled: false
    # baseUrl is the GitLab API root. Use a self-hosted EU instance for strict
    # residency requirements; gitlab.com SaaS is accepted but US-hosted.
    baseUrl: "https://gitlab.com/api/v4"
    # Optional: specific projects (numeric IDs or "group/repo" paths). If empty,
    # all projects the token can access (membership=true) are polled.
    projects: []
    webhookPort: 8083
    pollInterval: "60s"
    # Token and webhook secret are injected from the Secret (see secretName below).

  pagerduty:
    enabled: false
    webhookPort: 8082
    # Signing secret is injected from the Secret (see secretName below).

  # sharedWebhookPort is the port all new sources share. Must match ports.sharedWebhook.
  sharedWebhookPort: 8090

  # ---- Fully implemented sources ----

  jira:
    enabled: false
    # baseUrl: Jira API root. Required when enabled.
    # For Atlassian Cloud EU tenants: "https://<tenant>.atlassian.net"
    # For self-hosted EU Jira: "https://jira.example.eu"
    baseUrl: ""
    # projects: optional list of Jira project keys to watch (e.g. ["OPS", "INFRA"])
    projects: []
    # jqlFilter: optional additional JQL clause appended to the poller query
    jqlFilter: ""
    pollInterval: "60s"
    pollLookback: "1h"
    # Token and webhook secret are injected from the Secret:
    # OPERITAS_JIRA_TOKEN, OPERITAS_JIRA_WEBHOOK_SECRET

  datadog:
    enabled: false
    # apiBaseUrl must be an EU Datadog endpoint:
    # "https://api.datadoghq.eu" (EU1) or "https://api.eu1.datadoghq.com"
    apiBaseUrl: "https://api.datadoghq.eu"
    pollInterval: "60s"
    pollLookback: "1h"
    # Secrets injected from Secret:
    # OPERITAS_DATADOG_WEBHOOK_SECRET (DD-API-KEY for webhook auth)
    # OPERITAS_DATADOG_TOKEN (DD-API-KEY for poller)
    # OPERITAS_DATADOG_APP_KEY (DD-APPLICATION-KEY for poller)

  prometheus:
    enabled: false
    # authScheme: "bearer" (default), "basic", or "none"
    authScheme: "bearer"
    # basicUser: username for basic auth mode only
    basicUser: ""
    # Secret: OPERITAS_PROMETHEUS_WEBHOOK_SECRET

  # ---- Stub sources (webhook registered, no event processing yet) ----

  bitbucket:
    enabled: false
    # baseUrl: "https://api.bitbucket.org/2.0" (Cloud) or self-hosted EU URL
    baseUrl: "https://api.bitbucket.org/2.0"
    workspace: ""
    repos: []
    pollInterval: "60s"
    # Secrets: OPERITAS_BITBUCKET_WEBHOOK_SECRET, OPERITAS_BITBUCKET_TOKEN

  incident_io:
    enabled: false
    # apiBaseUrl must be the EU endpoint: "https://api.incident.io/v2"
    apiBaseUrl: "https://api.incident.io/v2"
    pollInterval: "60s"
    pollLookback: "1h"
    # Secrets: OPERITAS_INCIDENTIO_WEBHOOK_SECRET, OPERITAS_INCIDENTIO_TOKEN

  opsgenie:
    enabled: false
    # apiBaseUrl must be the EU endpoint: "https://api.eu.opsgenie.com/v2"
    apiBaseUrl: "https://api.eu.opsgenie.com/v2"
    pollInterval: "60s"
    pollLookback: "1h"
    # Secrets: OPERITAS_OPSGENIE_WEBHOOK_SECRET, OPERITAS_OPSGENIE_TOKEN

  servicenow:
    enabled: false
    # baseUrl: customer's EU-resident ServiceNow instance
    baseUrl: ""
    basicUser: "collector"
    tables:
      - change_request
    pollInterval: "60s"
    pollLookback: "1h"
    # Secrets: OPERITAS_SERVICENOW_WEBHOOK_SECRET, OPERITAS_SERVICENOW_TOKEN

  argocd:
    enabled: false
    # baseUrl: customer's EU-resident Argo CD server
    baseUrl: ""
    namespace: "argocd"
    appSelector: ""
    pollInterval: "60s"
    # Secrets: OPERITAS_ARGOCD_WEBHOOK_SECRET, OPERITAS_ARGOCD_TOKEN

  flux:
    enabled: false
    # Secret: OPERITAS_FLUX_WEBHOOK_SECRET

  spacelift:
    enabled: false
    # Secret: OPERITAS_SPACELIFT_WEBHOOK_SECRET

  grafana:
    enabled: false
    # Secret: OPERITAS_GRAFANA_WEBHOOK_SECRET

# Name of the Secret holding source credentials.
# Required keys (add only the secrets for sources you enable):
#   OPERITAS_GITHUB_TOKEN, OPERITAS_GITHUB_WEBHOOK_SECRET
#   OPERITAS_GITLAB_TOKEN, OPERITAS_GITLAB_WEBHOOK_SECRET
#   OPERITAS_PD_SIGNING_SECRET
#   OPERITAS_AZURE_CLIENT_SECRET (required when azure_activity is enabled with client-secret auth)
#   OPERITAS_JIRA_TOKEN, OPERITAS_JIRA_WEBHOOK_SECRET
#   OPERITAS_DATADOG_WEBHOOK_SECRET, OPERITAS_DATADOG_TOKEN, OPERITAS_DATADOG_APP_KEY
#   OPERITAS_PROMETHEUS_WEBHOOK_SECRET
#   OPERITAS_BITBUCKET_WEBHOOK_SECRET, OPERITAS_BITBUCKET_TOKEN
#   OPERITAS_INCIDENTIO_WEBHOOK_SECRET, OPERITAS_INCIDENTIO_TOKEN
#   OPERITAS_OPSGENIE_WEBHOOK_SECRET, OPERITAS_OPSGENIE_TOKEN
#   OPERITAS_SERVICENOW_WEBHOOK_SECRET, OPERITAS_SERVICENOW_TOKEN
#   OPERITAS_ARGOCD_WEBHOOK_SECRET, OPERITAS_ARGOCD_TOKEN
#   OPERITAS_FLUX_WEBHOOK_SECRET
#   OPERITAS_SPACELIFT_WEBHOOK_SECRET
#   OPERITAS_GRAFANA_WEBHOOK_SECRET
#   OPERITAS_REDACT_HASH_KEY (required when redact.hashPii is true)
secretName: "collector-secrets"

# PII redaction policy. Default: hard redact (strip the field entirely).
redact:
  hashPii: false
  # When hashPii is true, OPERITAS_REDACT_HASH_KEY must be set in the Secret
  # referenced by secretName. The value must be a valid hex-encoded string
  # (e.g. a 32-byte key expressed as 64 hex characters). The collector refuses
  # to start if hash_pii is enabled and the env var is absent or contains
  # non-hex characters.

# LOG_LEVEL controls the structured-log verbosity for the collector process.
# Valid values: debug, info (default), warn, error.
# Set via an environment variable on the Deployment — not stored in the ConfigMap
# because it is not a secret and does not require a restart on change in most
# setups. Add it under spec.containers[].env in an overlay values file:
#   env:
#     - name: LOG_LEVEL
#       value: debug
logLevel: ""

metrics:
  port: 9090

# NetworkPolicy controls. By default:
#   - Inbound: only webhook ports (from within the cluster) + metrics port
#   - Outbound: only the configured ingest endpoint (all other egress denied)
networkPolicy:
  enabled: true
  # ingressCidr restricts who can reach the webhook ports. Set to the CIDR of
  # your GitHub/PagerDuty ingress controller or VPN tunnel.
  ingressCidr: ""
  # egressCidr is REQUIRED when networkPolicy.enabled=true.
  # Set it to the resolved IP CIDR of the ingest endpoint so the NetworkPolicy
  # restricts 443 egress to EU infrastructure only (EU-residency enforcement).
  # Example: "1.2.3.4/32" for a single IP, or "1.2.3.0/24" for a range.
  # An empty value causes helm template / helm install to fail with an error.
  # To find the IP: dig +short ingest.operitas.eu
  # If the CloudTrail S3 bucket is accessed via a VPC private-link endpoint,
  # include that endpoint's CIDR here or add a second egress rule in an overlay.
  egressCidr: ""

# Probe configuration.
livenessProbe:
  httpGet:
    path: /healthz
    port: metrics
  initialDelaySeconds: 10
  periodSeconds: 30

readinessProbe:
  httpGet:
    path: /healthz
    port: metrics
  initialDelaySeconds: 5
  periodSeconds: 10

nodeSelector: {}
tolerations: []
affinity: {}
