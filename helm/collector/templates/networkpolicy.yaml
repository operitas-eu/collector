{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "collector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "collector.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "collector.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow webhook traffic from within the cluster (ingress controller or VPN).
    # Includes: github (8081), pagerduty (8082), gitlab (8083) on dedicated ports,
    # and the shared webhook router (8090) for all new sources.
    - ports:
        - port: {{ .Values.ports.githubWebhook }}
          protocol: TCP
        - port: {{ .Values.ports.gitlabWebhook }}
          protocol: TCP
        - port: {{ .Values.ports.pagerdutyWebhook }}
          protocol: TCP
        - port: {{ .Values.ports.sharedWebhook }}
          protocol: TCP
      {{- if .Values.networkPolicy.ingressCidr }}
      from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.ingressCidr }}
      {{- end }}
    # Allow Prometheus scraping from within the cluster (no external ingress).
    - ports:
        - port: {{ .Values.ports.metrics }}
          protocol: TCP
      from:
        - namespaceSelector: {}

  egress:
    # Allow DNS resolution (required for S3 bucket and ingest endpoint lookup).
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Allow HTTPS to the ingest endpoint only.
    # egressCidr is REQUIRED — leaving it empty would allow 443 egress to any
    # host, defeating the EU-residency enforcement that the NetworkPolicy exists
    # to provide. Set it to the resolved IP CIDR of your ingest endpoint (e.g.
    # "1.2.3.4/32" for ingest.operitas.eu). Use a /32 for a single IP or a
    # broader CIDR if the endpoint resolves to multiple addresses. For AWS S3
    # private-link (CloudTrail), include the VPC endpoint CIDR in a second rule
    # or widen this CIDR to cover both.
    - ports:
        - port: 443
          protocol: TCP
      to:
        - ipBlock:
            cidr: {{ required "networkPolicy.egressCidr is required when networkPolicy.enabled=true; set it to the resolved IP CIDR of the ingest endpoint (e.g. \"1.2.3.4/32\") — an empty value would allow unrestricted 443 egress and defeat EU-residency enforcement" .Values.networkPolicy.egressCidr }}
{{- end }}
