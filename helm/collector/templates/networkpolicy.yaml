{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "collector.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "collector.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "collector.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow webhook traffic from within the cluster (ingress controller or VPN).
    # Includes: github (8081), pagerduty (8082), gitlab (8083) on dedicated ports,
    # and the shared webhook router (8090) for all new sources.
    - ports:
        - port: {{ .Values.ports.githubWebhook }}
          protocol: TCP
        - port: {{ .Values.ports.gitlabWebhook }}
          protocol: TCP
        - port: {{ .Values.ports.pagerdutyWebhook }}
          protocol: TCP
        - port: {{ .Values.ports.sharedWebhook }}
          protocol: TCP
      {{- if .Values.networkPolicy.ingressCidr }}
      from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.ingressCidr }}
      {{- end }}
    # Allow Prometheus scraping from within the cluster (no external ingress).
    - ports:
        - port: {{ .Values.ports.metrics }}
          protocol: TCP
      from:
        - namespaceSelector: {}

  egress:
    # Allow DNS resolution (required for S3 bucket and ingest endpoint lookup).
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

    # Allow HTTPS to the ingest endpoint only.
    - ports:
        - port: 443
          protocol: TCP
      {{- if .Values.networkPolicy.egressCidr }}
      to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.egressCidr }}
      {{- end }}

    # Allow HTTPS to AWS S3 (CloudTrail bucket) — same port, different CIDR.
    # In practice this is covered by the 443 rule above when the CIDR is left empty.
    # Operators with strict egress controls should set egressCidr to cover both
    # the ingest endpoint and the S3 VPC endpoint if using a private link.
{{- end }}
