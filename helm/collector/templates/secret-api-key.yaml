{{/*
  secret-api-key.yaml — creates a Kubernetes Secret holding the ingest API key
  when .Values.apiKey is set directly. If .Values.existingApiKeySecret is set,
  this template is skipped and the deployment template references that secret
  instead.

  This file is NOT a documentation stub — it creates a live Secret when apiKey
  is non-empty. Do NOT commit real key values to values.yaml. Use --set at
  install time or supply an existingApiKeySecret for production deployments.
*/}}
{{- if and .Values.apiKey (not .Values.existingApiKeySecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "collector.fullname" . }}-api-key
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "collector.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  OPERITAS_INGEST_API_KEY: {{ .Values.apiKey | quote }}
{{- end }}
