# This file is a documentation stub. Do NOT create the Secret from this template
# in production. Create it out-of-band (e.g. via AWS Secrets Manager + External
# Secrets Operator, or kubectl create secret generic) to keep credential values
# out of Helm release history.
#
# Required keys in the Secret named by .Values.secretName:
#
#   OPERITAS_GITHUB_TOKEN          - GitHub PAT or App installation token (read:repo scope)
#   OPERITAS_GITHUB_WEBHOOK_SECRET - HMAC secret shared with GitHub webhook delivery
#   OPERITAS_PD_SIGNING_SECRET     - PagerDuty v3 webhook signing secret
#   OPERITAS_REDACT_HASH_KEY       - 32-byte hex key for PII hashing (if hash_pii: true)
#
# Example (development only — never commit real values):
#
#   kubectl create secret generic collector-secrets \
#     --namespace <namespace> \
#     --from-literal=OPERITAS_GITHUB_TOKEN=ghp_... \
#     --from-literal=OPERITAS_GITHUB_WEBHOOK_SECRET=whsec_... \
#     --from-literal=OPERITAS_PD_SIGNING_SECRET=pdsk_... \
#     --from-literal=OPERITAS_REDACT_HASH_KEY=0102...1f20
#
# Required mTLS secret (referenced by .Values.ingest.tlsSecretName):
#
#   kubectl create secret tls collector-mtls \
#     --namespace <namespace> \
#     --cert=collector.crt \
#     --key=collector.key
